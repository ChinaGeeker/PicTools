<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图片自动裁剪工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .upload-section {
            margin: 20px 0;
            text-align: center;
        }
        .upload-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .upload-btn:hover {
            background-color: #45a049;
        }
        #fileInput {
            display: none;
        }
        .preview-section {
            margin: 20px 0;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .image-box {
            text-align: center;
        }
        img {
            max-width: 300px;
            max-height: 300px;
            border: 1px solid #ddd;
            margin: 10px 0;
        }
        .result-section {
            margin: 20px 0;
            text-align: center;
        }
        .download-btn {
            padding: 10px 20px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .download-btn:hover {
            background-color: #0073aa;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片自动裁剪工具</h1>
        
        <div class="upload-section">
            <label for="fileInput" class="upload-btn">选择PNG图片</label>
            <input type="file" id="fileInput" accept=".png">
        </div>
        
        <div class="preview-section">
            <div class="image-container">
                <div class="image-box">
                    <h3>原始图片</h3>
                    <img id="originalImage" src="" alt="原始图片">
                </div>
                <div class="image-box">
                    <h3>裁剪后</h3>
                    <img id="croppedImage" src="" alt="裁剪后图片">
                </div>
            </div>
        </div>
        
        <div class="result-section">
            <button id="downloadBtn" class="download-btn" disabled>下载裁剪后的图片</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const { Jimp } = require('jimp');
        const { ipcRenderer } = require('electron');
        const path = require('path');
        const fs = require('fs');

        let croppedImagePath = '';

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type !== 'image/png') {
                showMessage('请选择PNG格式的图片', 'error');
                return;
            }

            const filePath = file.path;
            showMessage('正在处理图片...', 'success');

            try {
                // 加载图片
                const image = await Jimp.read(filePath);
                
                // 预览原始图片
                document.getElementById('originalImage').src = filePath;
                
                // 自动裁剪
                const croppedImage = await autoCrop(image);
                
                // 保存裁剪后的图片
                const outputPath = path.join(path.dirname(filePath), `cropped_${path.basename(filePath)}`);
                await croppedImage.writeAsync(outputPath);
                
                // 预览裁剪后的图片
                document.getElementById('croppedImage').src = outputPath;
                
                croppedImagePath = outputPath;
                document.getElementById('downloadBtn').disabled = false;
                showMessage('图片裁剪成功！', 'success');
            } catch (error) {
                console.error('处理图片时出错:', error);
                showMessage('处理图片时出错，请重试', 'error');
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (croppedImagePath) {
                // 在Electron中，我们可以直接打开文件所在目录
                const { shell } = require('electron');
                shell.showItemInFolder(croppedImagePath);
                showMessage('已打开裁剪后图片所在目录', 'success');
            }
        });

        async function autoCrop(image) {
            // 获取图片尺寸
            const width = image.bitmap.width;
            const height = image.bitmap.height;
            
            // 初始化边界
            let minX = width;
            let minY = height;
            let maxX = 0;
            let maxY = 0;
            
            // 遍历像素，找到非透明区域的边界
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const pixel = Jimp.intToRGBA(image.getPixelColor(x, y));
                    // 检查像素是否非透明（alpha > 0）
                    if (pixel.a > 0) {
                        minX = Math.min(minX, x);
                        minY = Math.min(minY, y);
                        maxX = Math.max(maxX, x);
                        maxY = Math.max(maxY, y);
                    }
                }
            }
            
            // 计算裁剪区域
            const cropWidth = maxX - minX + 1;
            const cropHeight = maxY - minY + 1;
            
            // 确保找到非透明区域
            if (cropWidth > 0 && cropHeight > 0) {
                // 裁剪图片
                return image.crop(minX, minY, cropWidth, cropHeight);
            } else {
                // 如果没有非透明区域，返回原始图片
                return image;
            }
        }

        function showMessage(text, type) {
            const messageElement = document.getElementById('message');
            messageElement.textContent = text;
            messageElement.className = `message ${type}`;
        }
    </script>
</body>
</html>
