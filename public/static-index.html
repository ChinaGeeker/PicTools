<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>图片自动裁剪工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .drop-area {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-area:hover {
            border-color: #4CAF50;
            background-color: #f9f9f9;
        }
        .drop-area.active {
            border-color: #4CAF50;
            background-color: #e8f5e8;
        }
        .drop-area p {
            margin: 10px 0;
            color: #666;
        }
        .upload-btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .upload-btn:hover {
            background-color: #45a049;
        }
        #fileInput {
            display: none;
        }
        .preview-section {
            margin: 20px 0;
        }
        .image-container {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }
        .image-box {
            text-align: center;
        }
        img {
            max-width: 300px;
            max-height: 300px;
            border: 1px solid #ddd;
            margin: 10px 0;
        }
        .image-placeholder {
            width: 300px;
            height: 300px;
            border: 1px dashed #ddd;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
            margin: 10px 0;
            position: relative;
        }
        .placeholder-content {
            text-align: center;
            color: #999;
        }
        .image-placeholder img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
            margin: 0;
            border-radius: 4px;
        }
        .result-section {
            margin: 20px 0;
            text-align: center;
        }
        .download-btn {
            padding: 10px 20px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .download-btn:hover {
            background-color: #0073aa;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片自动裁剪工具</h1>
        
        <div class="drop-area" id="dropArea">
            <p>将PNG图片拖放到这里，或者</p>
            <label for="fileInput" class="upload-btn">选择文件</label>
            <input type="file" id="fileInput" accept=".png">
            <p>支持PNG格式图片</p>
        </div>
        
        <div class="preview-section">
            <div class="image-container">
                <div class="image-box">
                    <h3>原始图片</h3>
                    <div class="image-placeholder" id="originalPlaceholder">
                        <img id="originalImage" src="" alt="原始图片" style="display: none;">
                        <div class="placeholder-content">
                            <p>请上传PNG图片</p>
                        </div>
                    </div>
                </div>
                <div class="image-box">
                    <h3>裁剪后</h3>
                    <div class="image-placeholder" id="croppedPlaceholder">
                        <img id="croppedImage" src="" alt="裁剪后图片" style="display: none;">
                        <div class="placeholder-content">
                            <p>裁剪结果将显示在这里</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="result-section">
            <a id="downloadBtn" class="download-btn" href="" download style="display: none;">下载裁剪后的图片</a>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const originalImage = document.getElementById('originalImage');
        const croppedImage = document.getElementById('croppedImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const message = document.getElementById('message');

        // 拖放事件处理
        dropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropArea.classList.add('active');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('active');
        });

        dropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            dropArea.classList.remove('active');
            const file = e.dataTransfer.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // 点击选择文件
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });

        // 点击拖放区域选择文件
        dropArea.addEventListener('click', (e) => {
            // 检查点击的是否是上传按钮或文件输入框
            if (e.target.classList.contains('upload-btn') || e.target.id === 'fileInput') {
                return; // 避免重复触发
            }
            // 重置fileInput的value，确保每次点击都能触发change事件
            fileInput.value = '';
            // 触发文件选择对话框
            fileInput.click();
        });

        function handleFile(file) {
            if (file.type !== 'image/png') {
                showMessage('请选择PNG格式的图片', 'error');
                return;
            }

            // 预览原始图片
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                originalImage.style.display = 'block';
                document.getElementById('originalPlaceholder').querySelector('.placeholder-content').style.display = 'none';
                
                // 处理图片裁剪
                processImage(e.target.result);
            };
            reader.readAsDataURL(file);

            showMessage('<div class="loading"></div> 正在处理图片...', 'success');
        }

        function processImage(imageUrl) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                // 创建画布
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                
                // 绘制图片
                ctx.drawImage(img, 0, 0);
                
                // 获取像素数据
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                // 初始化边界
                let minX = canvas.width;
                let minY = canvas.height;
                let maxX = 0;
                let maxY = 0;
                
                // 遍历像素，找到非透明区域的边界
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const idx = (y * canvas.width + x) * 4;
                        const alpha = data[idx + 3];
                        // 检查像素是否非透明（alpha > 0）
                        if (alpha > 0) {
                            minX = Math.min(minX, x);
                            minY = Math.min(minY, y);
                            maxX = Math.max(maxX, x);
                            maxY = Math.max(maxY, y);
                        }
                    }
                }
                
                // 计算裁剪区域
                const cropWidth = maxX - minX + 1;
                const cropHeight = maxY - minY + 1;
                
                // 确保找到非透明区域
                if (cropWidth > 0 && cropHeight > 0) {
                    // 创建新的画布
                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = cropWidth;
                    cropCanvas.height = cropHeight;
                    const cropCtx = cropCanvas.getContext('2d');
                    
                    // 裁剪图片
                    cropCtx.drawImage(img, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                    
                    // 转换为data URL
                    const croppedImageUrl = cropCanvas.toDataURL('image/png');
                    
                    // 显示裁剪后的图片
                    croppedImage.src = croppedImageUrl;
                    croppedImage.style.display = 'block';
                    document.getElementById('croppedPlaceholder').querySelector('.placeholder-content').style.display = 'none';
                    
                    // 更新下载按钮
                    downloadBtn.href = croppedImageUrl;
                    downloadBtn.download = `cropped_${Date.now()}.png`;
                    downloadBtn.style.display = 'inline-block';
                    
                    showMessage('图片裁剪成功！', 'success');
                } else {
                    // 如果没有非透明区域，显示原始图片
                    croppedImage.src = imageUrl;
                    croppedImage.style.display = 'block';
                    document.getElementById('croppedPlaceholder').querySelector('.placeholder-content').style.display = 'none';
                    
                    // 更新下载按钮
                    downloadBtn.href = imageUrl;
                    downloadBtn.download = `cropped_${Date.now()}.png`;
                    downloadBtn.style.display = 'inline-block';
                    
                    showMessage('图片裁剪成功！', 'success');
                }
            };
            img.onerror = () => {
                showMessage('图片加载失败，请重试', 'error');
            };
            img.src = imageUrl;
        }

        function showMessage(text, type) {
            message.innerHTML = text;
            message.className = `message ${type}`;
        }
    </script>
</body>
</html>
